name: Research Digest

on:
  schedule:
    - cron: '0 12 * * 1,3,5'  # Monday, Wednesday, Friday at 8 AM ET (UTC-4)
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Write .env.agents
        run: |
          echo "AGENT_ID=${{ secrets.AGENT_ID }}" > scripts/.env.agents
          echo "ENVIRONMENT_ID=${{ secrets.ENVIRONMENT_ID }}" >> scripts/.env.agents
          echo "MEMORY_STORE_ID=${{ secrets.MEMORY_STORE_ID }}" >> scripts/.env.agents

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 scripts/run-session.py
